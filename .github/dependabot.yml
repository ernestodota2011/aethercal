version: 2
updates:
  # Keep the pinned GitHub Actions SHAs current (grouped minor/patch to cut noise).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"

  # Keep uv.lock updated for the Python workspace.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
