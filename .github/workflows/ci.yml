name: CI

on:
  push:
    branches: [main]
  pull_request:

# One in-flight run per workflow+ref; newer pushes cancel the older run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the CI never needs to write to the repo.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync workspace (locked)
        run: uv sync --locked
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type-check (pyright)
        run: uv run pyright
      - name: Import contracts (import-linter)
        run: uv run lint-imports

  calendar-js:
    name: Calendar JS (boundaries, typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/aethercal-ui/js
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # No third-party JS setup action: ubuntu-latest ships Node 20 + npm, so we install a
      # pinned pnpm with the preinstalled npm. This keeps the CI supply-chain surface to the
      # single already-SHA-pinned action above (CLAUDE.md agentic-security).
      - name: Install pnpm (Node preinstalled on the runner)
        working-directory: ${{ github.workspace }}
        run: npm install -g pnpm@10.32.1
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      # ESLint import boundary: the headless calendar-core must never import React (RF-23).
      - name: Boundaries + lint
        run: pnpm lint
      - name: Type-check
        run: pnpm typecheck
      - name: Test (vitest + fast-check + testing-library)
        run: pnpm test
      # React dedupe contract base: react is a peerDependency, dev react aligned to 19 (F2-DR).
      - name: React alignment
        run: pnpm check-react

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          # setup-uv installs this interpreter and exports UV_PYTHON, so the
          # commands below run against the matrix Python version.
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Sync workspace (locked)
        run: uv sync --locked
      - name: Test (pytest)
        run: uv run pytest

  test-db:
    name: Test (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aethercal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync workspace (locked)
        run: uv sync --locked
      # Runs only the db-marked tests (autogenerate/type parity + the advisory-lock concurrency
      # and partial-index enforcement) against a real PostgreSQL; the default matrix skips them.
      - name: Test (pytest, db-marked)
        env:
          AETHERCAL_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aethercal_test
        run: uv run pytest -m db
