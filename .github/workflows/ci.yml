name: CI

on:
  push:
    branches: [main]
  pull_request:

# One in-flight run per workflow+ref; newer pushes cancel the older run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the CI never needs to write to the repo.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync workspace (locked)
        run: uv sync --locked
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type-check (pyright)
        run: uv run pyright
      - name: Import contracts (import-linter)
        run: uv run lint-imports
      # React alignment DERIVED from the installed Reflex (the source of truth), so a Reflex bump is
      # tracked automatically instead of drifting against a hardcoded literal. Node is preinstalled
      # on the runner; `uv run` puts the venv's Python (with reflex_base) on PATH for the script's
      # derivation. Lives here (not in calendar-js) because only this job has Reflex installed.
      - name: React alignment (derived from installed Reflex)
        # --require-derived: this job HAS Reflex, so a silent fallback (which would pass CI without
        # actually checking the installed Reflex) is a hard error here, not a warning.
        run: uv run node packages/aethercal-ui/js/scripts/check-react-alignment.mjs --require-derived

  calendar-js:
    name: Calendar JS (boundaries, typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/aethercal-ui/js
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # No third-party JS setup action: ubuntu-latest ships Node 20 + npm, so we install a
      # pinned pnpm with the preinstalled npm. This keeps the CI supply-chain surface to the
      # single already-SHA-pinned action above (CLAUDE.md agentic-security).
      - name: Install pnpm (Node preinstalled on the runner)
        working-directory: ${{ github.workspace }}
        run: npm install -g pnpm@10.32.1
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      # ESLint import boundary: the headless calendar-core must never import React (RF-23).
      - name: Boundaries + lint
        run: pnpm lint
      - name: Type-check
        run: pnpm typecheck
      - name: Test (vitest + fast-check + testing-library)
        run: pnpm test
      # Drift guard (fuente versionada sin drift): the committed bundle MUST equal a fresh rebuild.
      # `.gitattributes` normalizes it to LF on every platform and the frozen lockfile pins esbuild,
      # so the rebuild is reproducible cross-runner. A stale commit (TSX changed but the bundle not
      # rebuilt-and-recommitted) fails here — the hard gate for "source of truth is versioned".
      - name: Bundle drift guard (rebuild-and-diff)
        run: |
          pnpm build
          git diff --exit-code -- ':/packages/aethercal-ui/src/aethercal/ui/assets/aethercal-calendar.js' \
            || { echo "::error::aethercal-calendar.js is stale — run 'pnpm build' in packages/aethercal-ui/js and commit the regenerated bundle."; exit 1; }

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          # setup-uv installs this interpreter and exports UV_PYTHON, so the
          # commands below run against the matrix Python version.
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Sync workspace (locked)
        run: uv sync --locked
      - name: Test (pytest)
        run: uv run pytest

  test-db:
    name: Test (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aethercal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync workspace (locked)
        run: uv sync --locked
      # Runs only the db-marked tests (autogenerate/type parity + the advisory-lock concurrency
      # and partial-index enforcement) against a real PostgreSQL; the default matrix skips them.
      - name: Test (pytest, db-marked)
        env:
          AETHERCAL_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aethercal_test
        run: uv run pytest -m db

  calendar-release:
    name: Calendar release (wheel ships the JS bundle)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync workspace (locked)
        run: uv sync --locked
      # Anti "wheel-without-asset": hatchling silently builds a VALID wheel MISSING the JS bundle if
      # the asset is absent (F0-10 silent failure mode). This verifies the committed source asset,
      # builds the wheel, and re-opens it to assert the bundle is actually inside — a release can
      # never ship an asset-less wheel unnoticed. Relies on the committed bundle (kept fresh by the
      # calendar-js drift guard), so it needs no Node toolchain.
      - name: Build wheel + verify it ships the bundle
        run: uv run python packages/aethercal-ui/scripts/build_release.py --out-dir packages/aethercal-ui/dist
