name: Feature request
description: Propose a capability or a change to how AetherCal behaves.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, please skim the [ROADMAP](../../ROADMAP.md) — the feature may already be
        planned. AetherCal is spec-driven: the clearer the *problem* you describe, the easier it is
        to agree on the *shape* of a solution.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that AetherCal does not let you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? An API shape, a config option, a behaviour — whatever fits.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you have solved this, or workarounds you are using now.
    validations:
      required: false
