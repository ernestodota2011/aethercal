# AetherCal — self-host stack: the app (single unit) + PostgreSQL. Configured entirely by ./.env.
#
#   cd deploy && cp .env.example .env && edit .env && docker compose up --build
#
# Migrations run on the app's boot (AETHERCAL_AUTO_MIGRATE=1); the app waits for Postgres to be
# healthy first. The in-process scheduler runs inside the single `app` container (see README).

name: aethercal

services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    # POSTGRES_* come from ./.env (same file the app reads its AETHERCAL_* from).
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - aethercal-pgdata:/var/lib/postgresql/data
    healthcheck:
      # `app` depends_on this being healthy, so migrations never race an unready database.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  app:
    build:
      # Build context is the repo root so uv.lock + every workspace member is in scope.
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    # Every AETHERCAL_* value (DATABASE_URL, APP_SECRET, SMTP, Google, ...) is injected from ./.env.
    env_file:
      - .env
    environment:
      # The container is the single scheduler process; migrations run on boot.
      AETHERCAL_RUN_SCHEDULER: "1"
      AETHERCAL_AUTO_MIGRATE: "1"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Publish the API/booking page. Change the published (left) port via HOST_PORT in ./.env.
      - "${HOST_PORT:-8000}:8000"

volumes:
  aethercal-pgdata:
