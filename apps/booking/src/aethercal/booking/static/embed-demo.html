<!doctype html>
<!--
  AetherCal embed demo (B2.3) — an internal smoke-test page, not customer-facing.

  It plays the role of a TENANT's own site: a normal HTML page that drops the one-line widget
  snippet documented in docs/embedding.md and gets a booking iframe in return. Served as a plain
  static file (reachable at /static/embed-demo.html through the app's existing StaticFiles mount)
  rather than a server route under /embed/, so it can never shadow a real tenant's event slug (a
  dynamic route like "/embed/demo" would permanently steal that path from any tenant whose own
  event type happens to be named "demo").

  `data-aethercal-slug="discovery-call"` matches AetherCal's own booking page, so this file works
  unmodified against a local `python -m aethercal.booking` (pointed at a dev API with that event
  type seeded) or directly against https://book.aetherlogik.com.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AetherCal embed demo</title>
    <style>
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        max-width: 40rem;
        margin: 3rem auto;
        padding: 0 1.25rem;
        color: #1b1b1e;
      }
      code {
        background: #f2f0ec;
        padding: 0.1rem 0.35rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>AetherCal embed demo</h1>
    <p>
      This page is a stand-in for a tenant's own site. Everything below the divider comes from a
      single <code>&lt;script&gt;</code> tag — <code>embed.js</code> injects the
      <code>&lt;iframe&gt;</code> and keeps it sized to the guest's content.
    </p>
    <hr />

    <!-- The actual widget snippet — see docs/embedding.md for the copy-paste version. -->
    <script
      src="/embed.js"
      data-aethercal-slug="discovery-call"
      data-lang="en"
    ></script>
  </body>
</html>
