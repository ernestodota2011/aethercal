[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aethercal-client"
version = "0.0.0"
description = "AetherCal SDK: sync + async httpx client for the API v1"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "AetherLogik" }]
classifiers = ["Development Status :: 2 - Pre-Alpha", "Typing :: Typed"]
dependencies = [
    "aethercal-schemas",
    "httpx>=0.27",
]

[tool.uv.sources]
aethercal-schemas = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/aethercal"]
